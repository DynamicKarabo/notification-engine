<!DOCTYPE html>
<html>
<head>
    <title>SignalR Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-top: 10px; }
        .connected { color: green; }
        .disconnected { color: red; }
        .message { margin: 5px 0; }
    </style>
</head>
<body>
    <h1>SignalR Test</h1>
    <p>Status: <span id="status" class="disconnected">Disconnected</span></p>
    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()">Disconnect</button>
    <div id="messages"></div>

    <script>
        let connection = null;

        async function connect() {
            const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJodHRwOi8vc2NoZW1hcy54bWxzb2FwLm9yZy93cy8yMDA1LzA1L2lkZW50aXR5L2NsYWltcy9uYW1laWRlbnRpZmllciI6InRlc3QtdXNlci0xIiwidGVuYW50X2lkIjoidGVzdC10ZW5hbnQtMSIsImV4cCI6MTc3NDg4ODE5MCwiaXNzIjoidGVzdC1pc3N1ZXIiLCJhdWQiOiJub3RpZmljYXRpb24tZW5naW5lLWFwaSJ9.j2Tj4nqRXEcEzdsHS5buWnh9O9ZPY_C8oc1viNVK2xM";

            connection = new signalR.HubConnectionBuilder()
                .withUrl("http://localhost:5270/hubs/dashboard?access_token=" + token)
                .withAutomaticReconnect()
                .build();

            connection.on("ReceiveNotification", (data) => {
                addMessage("Received: " + JSON.stringify(data));
            });

            connection.on("UserJoined", (data) => {
                addMessage("UserJoined: " + JSON.stringify(data));
            });

            connection.on("UserLeft", (data) => {
                addMessage("UserLeft: " + JSON.stringify(data));
            });

            try {
                await connection.start();
                document.getElementById("status").textContent = "Connected";
                document.getElementById("status").className = "connected";
                addMessage("Connected to hub!");
            } catch (err) {
                addMessage("Error: " + err);
            }
        }

        function disconnect() {
            if (connection) {
                connection.stop();
                document.getElementById("status").textContent = "Disconnected";
                document.getElementById("status").className = "disconnected";
                addMessage("Disconnected");
            }
        }

        function addMessage(msg) {
            const div = document.createElement("div");
            div.className = "message";
            div.textContent = new Date().toISOString() + " - " + msg;
            document.getElementById("messages").appendChild(div);
        }
    </script>
</body>
</html>
